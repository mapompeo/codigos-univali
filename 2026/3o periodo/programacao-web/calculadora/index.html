<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Poupança</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: #f5f7fa;
      }

      .container {
        width: 100%;
        max-width: 400px;
        border: 1px solid #d5dbe3;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 1.4rem;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: #555;
      }

      input {
        display: block;
        margin-bottom: 12px;
        width: 100%;
        padding: 8px;
        border: 1px solid #cfd5de;
        border-radius: 6px;
      }

      input:focus {
        outline: none;
        border-color: #0f766e;
      }

      .botoes {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px;
        border: 0;
        border-radius: 6px;
        background: #16a34a;
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(0.95);
      }

      button:last-child {
        background: #dc2626;
      }

      #resultado {
        margin-top: 20px;
        font-weight: bold;
        color: #0f7a5b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Planejar Poupança</h1>

      <label>Objetivo Financeiro (R$):</label>
      <input type="number" id="objetivo" placeholder="Ex: 5000" required />

      <label>Valor Inicial (R$):</label>
      <input type="number" id="inicial" placeholder="Ex: 1000" required />

      <label>Depósito Mensal (R$):</label>
      <input type="number" id="mensal" placeholder="Ex: 200" required />

      <label>Juros Mensal (%):</label>
      <input type="number" id="juros" placeholder="Ex: 0.5" required />

      <div class="botoes">
        <button onclick="calcular()">Calcular</button>
        <button onclick="limpar()">Limpar</button>
      </div>

      <div id="resultado"></div>
    </div>

    <script src="poupanca.js"></script>
  </body>
</html>
