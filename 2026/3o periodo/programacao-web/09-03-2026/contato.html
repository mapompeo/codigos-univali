<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato — ONG Bem-estar Animal</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        color: #333;
      }

      header {
        background-color: #333;
        color: #fff;
        text-align: center;
        padding: 20px;
      }

      nav ul {
        list-style: none;
        margin: 10px 0 0;
        padding: 0;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      nav a {
        color: #fff;
        text-decoration: none;
        padding: 6px 12px;
      }

      nav a:hover {
        text-decoration: underline;
      }

      main {
        max-width: 500px;
        margin: 20px auto;
        padding: 0 15px;
      }

      h2 {
        margin-top: 0;
      }

      label {
        display: block;
        margin-bottom: 4px;
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"],
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        font-family: Arial, sans-serif;
        font-size: 14px;
        margin-bottom: 14px;
      }

      textarea {
        resize: vertical;
      }

      input[type="submit"] {
        background-color: #333;
        color: #fff;
        border: none;
        padding: 10px 24px;
        font-size: 14px;
        cursor: pointer;
      }

      footer {
        background-color: #333;
        color: #fff;
        text-align: center;
        padding: 15px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ONG Bem-estar Animal</h1>
      <nav>
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="./servicos.html">Serviços</a></li>
          <li><a href="./adote.html">Adote um Animal</a></li>
          <li><a href="./produtos.html">Produtos</a></li>
          <li class="active"><a href="./contato.html">Contato</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h2>Entre em Contato</h2>
      <form>
        <label for="nome">Nome:</label>
        <input
          type="text"
          id="nome"
          name="nome"
          placeholder="Seu nome completo"
          required
        />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          required
        />

        <label for="telefone">Telefone:</label>
        <input
          type="tel"
          id="telefone"
          name="telefone"
          required
          pattern="[0-9]{10,11}"
          placeholder="Somente números (DDD + número)"
        />

        <label for="cpf">CPF:</label>
        <input
          type="text"
          id="cpf"
          name="cpf"
          required
          pattern="[0-9]{11}"
          placeholder="Somente números (sem pontos ou traços)"
        />

        <label for="mensagem">Mensagem:</label>
        <textarea
          id="mensagem"
          name="mensagem"
          rows="5"
          required
          placeholder="Escreva sua mensagem aqui..."
        ></textarea>

        <input type="submit" value="Enviar Mensagem" />
      </form>
    </main>
    <footer>
      <p>Todos os direitos reservados &copy; 2026 — ONG Bem-estar Animal</p>
    </footer>
  </body>
</html>
